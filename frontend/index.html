<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustDial Data Scraper</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🕷️ JustDial Data Scraper</h1>
            <p class="subtitle">Extract business data with ease</p>
        </header>

        <div class="main-content">
            <!-- Scraper Card -->
            <div class="card">
                <h2>Start Scraping</h2>
                
                <div id="scrapeMessage" class="message"></div>
                
                <div class="input-method-toggle">
                    <label class="radio-group">
                        <input type="radio" name="inputMethod" value="url" checked onchange="toggleInputMethod()"> Provide a URL
                    </label>
                    <label class="radio-group">
                        <input type="radio" name="inputMethod" value="city_keyword" onchange="toggleInputMethod()"> Enter City/Keyword
                    </label>
                </div>
                
                <div id="urlInputGroup" class="form-group">
                    <label for="urlInput">Enter JustDial URL</label>
                    <input 
                        type="url" 
                        id="urlInput" 
                        placeholder="https://www.justdial.com/Bangalore/search?q=Pizza"
                        value=""
                    >
                </div>

                <div id="cityKeywordInputGroup" class="form-group hidden">
                    <label for="cityInput">City</label>
                    <input 
                        type="text" 
                        id="cityInput" 
                        placeholder="e.g. Bangalore"
                        style="margin-bottom: 10px;"
                    >
                    <label for="keywordInput">Search Keyword</label>
                    <input 
                        type="text" 
                        id="keywordInput" 
                        placeholder="e.g. Pizza"
                    >
                </div>

                <button id="scrapeBtn" onclick="startScraping()">
                    Start Scraping
                </button>

                <div class="loading" id="scrapeLoading">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px; color: #667eea;">Scraping in progress...</p>
                </div>
            </div>

            <!-- Statistics Card -->
            <div class="card">
                <h2>Statistics</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-number" id="totalFiles">0</div>
                        <div class="stat-label">Total Files</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="totalRecords">0</div>
                        <div class="stat-label">Total Records</div>
                    </div>
                </div>
                <button onclick="refreshStats()" style="width: 100%;">Refresh Stats</button>
            </div>
        </div>

        <!-- Results Section -->
        <div class="results-section">
            <h2>Scraped Data</h2>
            
            <div class="tabs">
                <button class="tab-button active" data-tab="preview" onclick="switchTab('preview')">Preview</button>
                <button class="tab-button" data-tab="files" onclick="switchTab('files')">Files</button>
            </div>

            <!-- Preview Tab -->
            <div id="preview" class="tab-content active">
                <div id="previewContent" class="empty-state">
                    <p>No data to preview. Start scraping to see results here.</p>
                </div>
            </div>

            <!-- Files Tab -->
            <div id="files" class="tab-content">
                <div id="filesList" class="empty-state">
                    <p>No files found. Start scraping to create files.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
